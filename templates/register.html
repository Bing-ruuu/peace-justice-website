{% extends "base.html" %}

{% block title %}注册 - 和平、正义与强大机构{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center py-12 px-6">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl p-8 fade-in">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">创建账号</h1>
                <p class="text-gray-500">加入我们，共同推动和平正义</p>
            </div>

            <form method="POST" action="/register" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                    <input type="text" name="username" required minlength="3"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                        placeholder="请输入用户名">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">邮箱地址</label>
                    <input type="email" name="email" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                        placeholder="your@email.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                    <input type="password" name="password" required minlength="6"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                        placeholder="至少6位字符">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">确认密码</label>
                    <input type="password" name="confirm_password" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                        placeholder="再次输入密码">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors duration-300">
                    注册
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">已有账号？
                    <a href="/login" class="text-blue-600 hover:text-blue-800 font-semibold">立即登录</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
