{% extends "base.html" %}

{% block title %}登录 - 和平、正义与强大机构{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center py-12 px-6">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl p-8 fade-in">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">欢迎回来</h1>
                <p class="text-gray-500">登录到和平、正义与强大机构</p>
            </div>

            <form method="POST" action="/login" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">邮箱地址</label>
                    <input type="email" name="email" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                        placeholder="your@email.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                        placeholder="••••••••">
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" name="remember" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                        <span class="ml-2 text-sm text-gray-600">记住我</span>
                    </label>
                    <a href="/forgot" class="text-sm text-blue-600 hover:text-blue-800">忘记密码？</a>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors duration-300">
                    登录
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">还没有账号？
                    <a href="/register" class="text-blue-600 hover:text-blue-800 font-semibold">立即注册</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
