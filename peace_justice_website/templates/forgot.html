{% extends "base.html" %}

{% block title %}忘记密码 - 和平、正义与强大机构{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center py-12 px-6">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl p-8 fade-in">
            <div class="text-center mb-8">
                <div class="text-5xl mb-4">🔑</div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">找回密码</h1>
                <p class="text-gray-500">输入您的注册邮箱，我们将发送重置链接</p>
            </div>

            <form method="POST" action="/forgot" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">邮箱地址</label>
                    <input type="email" name="email" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                        placeholder="your@email.com">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors duration-300">
                    发送重置链接
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/login" class="text-blue-600 hover:text-blue-800 font-semibold">返回登录</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
